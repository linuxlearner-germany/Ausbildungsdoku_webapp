services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ausbildungsdoku-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD:-YourStrong(!)Password}
    ports:
      - "${LOCAL_MSSQL_PORT_MAPPING:-1433:1433}"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SQLCMD=$$(command -v sqlcmd || true); if [ -z \"$$SQLCMD\" ]; then for candidate in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd; do if [ -x \"$$candidate\" ]; then SQLCMD=$$candidate; break; fi; done; fi; [ -n \"$$SQLCMD\" ] && $$SQLCMD -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      mssql:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/bash
      - -lc
      - |
        SQLCMD="$$(command -v sqlcmd || true)"
        if [ -z "$$SQLCMD" ]; then
          for candidate in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd; do
            if [ -x "$$candidate" ]; then
              SQLCMD="$$candidate"
              break
            fi
          done
        fi
        [ -n "$$SQLCMD" ] || exit 1
        "$$SQLCMD" -C -S mssql -U sa -P "${MSSQL_PASSWORD:-YourStrong(!)Password}" -Q "IF DB_ID(N'${MSSQL_DATABASE:-berichtsheft}') IS NULL CREATE DATABASE [${MSSQL_DATABASE:-berichtsheft}]; IF DB_ID(N'${MSSQL_TEST_DATABASE:-berichtsheft_test}') IS NULL CREATE DATABASE [${MSSQL_TEST_DATABASE:-berichtsheft_test}];"

  redis:
    image: redis:7.4-alpine
    container_name: ausbildungsdoku-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${LOCAL_REDIS_PORT_MAPPING:-6379:6379}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ausbildungsdoku-webapp:local
    container_name: ausbildungsdoku-app-local
    init: true
    depends_on:
      mssql:
        condition: service_healthy
      mssql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      HOST: 0.0.0.0
      PORT: 3010
      APP_BASE_URL: ${APP_BASE_URL:-}
      APP_BASE_PATH: ${APP_BASE_PATH:-}
      API_BASE_URL: ${API_BASE_URL:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-15mb}
      SERVER_REQUEST_TIMEOUT_MS: ${SERVER_REQUEST_TIMEOUT_MS:-30000}
      SERVER_HEADERS_TIMEOUT_MS: ${SERVER_HEADERS_TIMEOUT_MS:-35000}
      SERVER_KEEP_ALIVE_TIMEOUT_MS: ${SERVER_KEEP_ALIVE_TIMEOUT_MS:-5000}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-10000}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-berichtsheft.sid}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      SESSION_SECURE: ${SESSION_SECURE:-false}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      SESSION_MAX_AGE_MS: ${SESSION_MAX_AGE_MS:-28800000}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-berichtsheft:}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-10000}
      REDIS_COMMAND_TIMEOUT_MS: ${REDIS_COMMAND_TIMEOUT_MS:-5000}
      REDIS_MAX_RETRIES: ${REDIS_MAX_RETRIES:-4}
      REDIS_PING_INTERVAL_MS: ${REDIS_PING_INTERVAL_MS:-30000}
      MSSQL_HOST: mssql
      MSSQL_PORT: 1433
      MSSQL_DATABASE: ${MSSQL_DATABASE:-berichtsheft}
      MSSQL_USER: ${MSSQL_USER:-sa}
      MSSQL_PASSWORD: ${MSSQL_PASSWORD:-YourStrong(!)Password}
      MSSQL_ENCRYPT: ${MSSQL_ENCRYPT:-true}
      MSSQL_TRUST_SERVER_CERTIFICATE: ${MSSQL_TRUST_SERVER_CERTIFICATE:-true}
      MSSQL_POOL_MIN: ${MSSQL_POOL_MIN:-0}
      MSSQL_POOL_MAX: ${MSSQL_POOL_MAX:-10}
      MSSQL_CONNECTION_TIMEOUT_MS: ${MSSQL_CONNECTION_TIMEOUT_MS:-15000}
      MSSQL_REQUEST_TIMEOUT_MS: ${MSSQL_REQUEST_TIMEOUT_MS:-15000}
      APPLY_MIGRATIONS_ON_START: ${APPLY_MIGRATIONS_ON_START:-true}
      BOOTSTRAP_DATABASE_ON_START: ${BOOTSTRAP_DATABASE_ON_START:-true}
      RESET_DATABASE_ON_START: ${RESET_DATABASE_ON_START:-false}
      ENABLE_DEMO_DATA: ${ENABLE_DEMO_DATA:-true}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD must be set}
    ports:
      - "${APP_PORT_MAPPING:-3010:3010}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3010${APP_BASE_PATH:-}/api/ready').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mssql-data:
  redis-data:

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ausbildungsdoku-mssql-dev
    user: "0:0"
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD:-YourStrong(!)Password}
    ports:
      - "${DEV_INFRA_MSSQL_PORT_MAPPING:-1433:1433}"
    volumes:
      - mssql-dev-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SQLCMD=$$(command -v sqlcmd || true); if [ -z \"$$SQLCMD\" ]; then for candidate in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd; do if [ -x \"$$candidate\" ]; then SQLCMD=$$candidate; break; fi; done; fi; [ -n \"$$SQLCMD\" ] && $$SQLCMD -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      mssql:
        condition: service_healthy
    restart: "no"
    environment:
      MSSQL_PASSWORD: ${MSSQL_PASSWORD:-YourStrong(!)Password}
      MSSQL_DATABASE: ${MSSQL_DATABASE:-ausbildungsdoku}
      MSSQL_TEST_DATABASE: ${MSSQL_TEST_DATABASE:-ausbildungsdoku_test}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        for name in "$${MSSQL_DATABASE:-ausbildungsdoku}" "$${MSSQL_TEST_DATABASE:-ausbildungsdoku_test}" "$${DB_USER:?DB_USER must be set}"; do
          [[ "$$name" =~ ^[A-Za-z0-9_]+$$ ]] || { echo "Ungueltiger SQL-Bezeichner: $$name" >&2; exit 1; }
        done
        DB_PASSWORD_SQL="$${DB_PASSWORD:?DB_PASSWORD must be set}"
        DB_PASSWORD_SQL="$${DB_PASSWORD_SQL//\'/\'\'}"
        SQLCMD="$$(command -v sqlcmd || true)"
        if [ -z "$$SQLCMD" ]; then
          for candidate in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd; do
            if [ -x "$$candidate" ]; then
              SQLCMD="$$candidate"
              break
            fi
          done
        fi
        [ -n "$$SQLCMD" ] || exit 1
        "$$SQLCMD" -C -S mssql -U sa -P "$${MSSQL_PASSWORD:-YourStrong(!)Password}" -d master \
          -v app_user="$${DB_USER:?DB_USER must be set}" app_password="$$DB_PASSWORD_SQL" app_db="$${MSSQL_DATABASE:-ausbildungsdoku}" test_db="$${MSSQL_TEST_DATABASE:-ausbildungsdoku_test}" \
          -Q "IF DB_ID(N'\$(app_db)') IS NULL EXEC(N'CREATE DATABASE [\$(app_db)]'); IF DB_ID(N'\$(test_db)') IS NULL EXEC(N'CREATE DATABASE [\$(test_db)]'); IF SUSER_ID(N'\$(app_user)') IS NULL CREATE LOGIN [\$(app_user)] WITH PASSWORD = N'\$(app_password)', CHECK_POLICY = ON; ELSE ALTER LOGIN [\$(app_user)] WITH PASSWORD = N'\$(app_password)', CHECK_POLICY = ON; EXEC(N'USE [\$(app_db)]; IF USER_ID(N''\$(app_user)'') IS NULL CREATE USER [\$(app_user)] FOR LOGIN [\$(app_user)]; ALTER ROLE db_owner ADD MEMBER [\$(app_user)];'); EXEC(N'USE [\$(test_db)]; IF USER_ID(N''\$(app_user)'') IS NULL CREATE USER [\$(app_user)] FOR LOGIN [\$(app_user)]; ALTER ROLE db_owner ADD MEMBER [\$(app_user)];');"

  redis:
    image: redis:7.4-alpine
    container_name: ausbildungsdoku-redis-dev
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --save '' --appendonly no --dir /data --requirepass \"$${REDIS_PASSWORD:?REDIS_PASSWORD must be set}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${DEV_INFRA_REDIS_PORT_MAPPING:-6379:6379}"
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mssql-dev-data:
  redis-dev-data:
